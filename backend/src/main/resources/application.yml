spring:
  application:
    name: location-share-backend
  datasource:
    url: jdbc:h2:file:./data/location-share;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: false

server:
  port: 8080

# HS256 至少需要 256 bit（32 字节）密钥；生产务必通过环境变量覆盖
jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  access-token-minutes: ${JWT_ACCESS_MINUTES:15}
  refresh-token-days: ${JWT_REFRESH_DAYS:14}

cors:
  allowed-origin-patterns:
    - "*"

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/locationshare}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USER:locationshare}
    password: ${DATABASE_PASSWORD:locationshare}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
